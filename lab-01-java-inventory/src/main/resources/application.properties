# Application Configuration
spring.application.name=inventory-service
server.port=8080
server.servlet.context-path=/inventory

# Database Configuration - H2 In-Memory (no Docker required for quick start)
spring.datasource.url=jdbc:h2:mem:inventorydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=always

# MySQL Docker profile (use with: mvn spring-boot:run -Dspring.profiles.active=mysql)
# spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=inventory_user
# spring.datasource.password=inventory_pass
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# VULNERABLE: Weak session configuration for educational purposes
server.servlet.session.timeout=60m
server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=none
server.servlet.session.tracking-modes=cookie,url

# VULNERABLE: Detailed error messages exposed
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging Configuration - VULNERABLE: Too verbose for production
logging.level.com.secureshop.inventory=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Log SQL queries and parameters - SECURITY RISK
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

# File logging
logging.file.name=logs/inventory-app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Actuator Configuration - VULNERABLE: Exposes sensitive endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=always
management.endpoint.configprops.show-values=always

# VULNERABLE: Disable CSRF protection for easier exploitation
spring.security.csrf.enabled=false

# VULNERABLE: Allow all origins for CORS
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Development Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# VULNERABLE: Expose H2 console in all profiles
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# VULNERABLE: Disable security headers
security.headers.frame=false
security.headers.content-type=false
security.headers.xss=false

# Flyway Configuration
spring.flyway.enabled=false

# VULNERABLE: Debug information exposure
debug=true
trace=true

# VULNERABLE: Weak encryption settings
server.ssl.enabled=false
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1,TLSv1.1,TLSv1.2

# Application-specific properties
app.name=SecureShop Inventory Service
app.version=1.0.0-SNAPSHOT
app.description=Vulnerable inventory management system for AppSec training

# VULNERABLE: Hardcoded secrets (for demonstration)
app.jwt.secret=mySecretKey
app.encryption.key=1234567890123456
app.admin.password=admin123

# File upload configuration - VULNERABLE
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=/tmp

# VULNERABLE: Allow all file types
app.upload.allowed-extensions=*
app.upload.max-size=10485760

# Email configuration (if needed for password reset)
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Cache configuration
spring.cache.type=simple
spring.cache.cache-names=products,users,suppliers

# VULNERABLE: Expose internal paths
server.error.path=/error
server.error.whitelabel.enabled=true

# Banner configuration
spring.banner.location=classpath:banner.txt
spring.banner.charset=UTF-8

# VULNERABLE: Permissive CORS configuration
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
management.endpoints.web.cors.allowed-headers=*
