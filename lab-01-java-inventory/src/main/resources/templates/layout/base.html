<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title} ?: 'SecureShop Inventory'">SecureShop Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .vuln-badge { background:#dc3545; color:#fff; font-size:.7em; padding:2px 6px; border-radius:3px; vertical-align:middle; }
        .sql-display { background:#1e1e1e; color:#d4d4d4; font-family:monospace; padding:10px; border-radius:4px; font-size:.85em; white-space:pre-wrap; }
        .sidebar { min-height:calc(100vh - 56px); background:#2c3e50; }
        .sidebar .nav-link { color:#bdc3c7; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color:#fff; background:rgba(255,255,255,.1); }
        .sidebar-heading { color:#7f8c8d; font-size:.75em; text-transform:uppercase; padding:.5rem 1rem; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark py-1">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="bi bi-box-seam"></i> SecureShop Inventory
            <span class="vuln-badge ms-2">VULNERABLE LAB</span>
        </a>
        <div class="d-flex align-items-center">
            <span class="text-light me-3 small" th:if="${session.username}">
                <i class="bi bi-person-circle"></i>
                <span th:text="${session.username}">user</span>
                <span class="badge bg-warning text-dark ms-1" th:text="${session.role}">ROLE</span>
            </span>
            <a href="/auth/logout" class="btn btn-outline-light btn-sm" th:if="${session.username}">Logout</a>
            <a href="/auth/login"  class="btn btn-outline-light btn-sm" th:unless="${session.username}">Login</a>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 p-0 sidebar d-none d-md-block" th:if="${session.username}">
            <div class="pt-3">
                <p class="sidebar-heading">Navigation</p>
                <a href="/dashboard" class="nav-link px-3 py-2"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a href="/lab-guide" class="nav-link px-3 py-2"><i class="bi bi-book me-2"></i>Lab Guide</a>

                <p class="sidebar-heading mt-3">Inventory</p>
                <a href="/products"           class="nav-link px-3 py-2"><i class="bi bi-grid me-2"></i>Products</a>
                <a href="/products/search"    class="nav-link px-3 py-2"><i class="bi bi-search me-2"></i>Search Products</a>
                <a href="/inventory"          class="nav-link px-3 py-2"><i class="bi bi-boxes me-2"></i>Inventory</a>
                <a href="/inventory/report"   class="nav-link px-3 py-2"><i class="bi bi-bar-chart me-2"></i>Reports</a>
                <a href="/suppliers"          class="nav-link px-3 py-2"><i class="bi bi-truck me-2"></i>Suppliers</a>

                <p class="sidebar-heading mt-3">Attack Surface</p>
                <a href="/h2-console"         class="nav-link px-3 py-2 text-warning"><i class="bi bi-database me-2"></i>H2 Console</a>
                <a href="/actuator"           class="nav-link px-3 py-2 text-warning"><i class="bi bi-gear me-2"></i>Actuator</a>
                <a href="/actuator/env"       class="nav-link px-3 py-2 text-warning"><i class="bi bi-key me-2"></i>Env Variables</a>
            </div>
        </div>

        <!-- Main content -->
        <div class="col p-4" th:classappend="${session.username} ? 'col-md-10' : 'col-12'">
            <div th:replace="${content}"><!-- page content goes here --></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
