<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - SecureShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white"><h5 class="mb-0">Register</h5></div>
                <div class="card-body">
                    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <form action="/auth/register" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                    <hr>
                    <div class="text-center"><a href="/auth/login">Already have an account? Login</a></div>
                </div>
            </div>
            <div class="card mt-3 border-warning">
                <div class="card-body">
                    <p class="small mb-1"><strong>SQL Injection hint (registration):</strong></p>
                    <p class="small mb-0">Try username: <code>test', 'pass', 'x@x.com', 'ADMIN', true) --</code></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
