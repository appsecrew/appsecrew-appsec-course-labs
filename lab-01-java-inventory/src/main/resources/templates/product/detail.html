<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Product Detail - SecureShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <a href="/products" class="btn btn-outline-secondary btn-sm mb-3">← Back to Products</a>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${product}" class="card">
        <div class="card-header"><h5 th:text="${product.name}">Product</h5></div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>ID:</strong> <span th:text="${product.id}">-</span></p>
                    <p><strong>Description:</strong> <span th:text="${product.description}">-</span></p>
                    <p><strong>Category:</strong> <span class="badge bg-secondary" th:text="${product.category}">-</span></p>
                    <p><strong>Price:</strong> $<span th:text="${product.price}">0</span></p>
                    <p><strong>Quantity:</strong> <span th:text="${product.quantity}">0</span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>Supplier:</strong> <span th:text="${product.supplier_name}">-</span></p>
                    <p><strong>Supplier Email:</strong> <span th:text="${product.supplier_email}">-</span></p>
                    <p><strong>Created:</strong> <span th:text="${product.created_at}">-</span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Transaction history -->
    <div th:if="${history != null && !history.isEmpty()}" class="card mt-3">
        <div class="card-header"><h6>Transaction History</h6></div>
        <div class="card-body p-0">
            <table class="table table-sm mb-0">
                <thead class="table-light"><tr><th>Type</th><th>Qty Change</th><th>Notes</th><th>User</th><th>Date</th></tr></thead>
                <tbody>
                    <tr th:each="tx : ${history}">
                        <td><span th:text="${tx.transaction_type}" th:classappend="${tx.transaction_type == 'IN'} ? 'badge bg-success' : 'badge bg-danger'"></span></td>
                        <td th:text="${tx.quantity_change}">0</td>
                        <td th:text="${tx.notes}">-</td>
                        <td th:text="${tx.username}">-</td>
                        <td th:text="${tx.created_at}">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
