<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Inventory - SecureShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between mb-3">
        <h4><i class="bi bi-boxes"></i> Inventory Status</h4>
        <div>
            <a href="/inventory/report" class="btn btn-outline-primary btn-sm me-2">View Report</a>
            <a href="/dashboard" class="btn btn-outline-secondary btn-sm">← Dashboard</a>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- Stock adjustment form (vulnerable notes field) -->
    <div class="card mb-3 border-warning">
        <div class="card-header bg-warning text-dark">
            <strong><i class="bi bi-bug"></i> Adjust Stock (SQL Injection in Notes)</strong>
        </div>
        <div class="card-body">
            <form action="/inventory/adjust" method="POST" class="row g-2">
                <div class="col-md-2">
                    <select class="form-select" name="productId">
                        <option th:each="item : ${items}" th:value="${item.id}" th:text="${item.name}">Product</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control" name="quantityChange" placeholder="Qty change (e.g. +10 or -5)">
                </div>
                <div class="col-md-2">
                    <select class="form-select" name="transactionType">
                        <option value="IN">IN</option>
                        <option value="OUT">OUT</option>
                        <option value="ADJUST">ADJUST</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" name="notes" placeholder="Notes (VULNERABLE - try SQL injection here)">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-warning w-100">Adjust</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>ID</th><th>Product</th><th>Category</th><th>Stock Qty</th><th>Price</th><th>Status</th></tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.id}">-</td>
                        <td><a th:href="'/products/' + ${item.id}" th:text="${item.name}">-</a></td>
                        <td th:text="${item.category}">-</td>
                        <td th:text="${item.quantity}">-</td>
                        <td th:text="'$' + ${item.price}">-</td>
                        <td>
                            <span th:text="${item.stock_status}"
                                  th:classappend="${item.stock_status == 'CRITICAL'} ? 'badge bg-danger' :
                                                  ${item.stock_status == 'LOW'} ? 'badge bg-warning text-dark' :
                                                  'badge bg-success'">OK</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
