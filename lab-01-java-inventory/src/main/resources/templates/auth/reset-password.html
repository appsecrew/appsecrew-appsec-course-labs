<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - SecureShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark"><h5 class="mb-0">Reset Password</h5></div>
                <div class="card-body">
                    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <form action="/auth/reset-password" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Reset Password</button>
                    </form>
                    <hr>
                    <a href="/auth/login">Back to Login</a>
                </div>
            </div>
            <div class="card mt-3 border-danger">
                <div class="card-body">
                    <p class="small mb-0"><strong>Vulnerability:</strong> Second-order SQL injection. The reset sets password to "temp123" and the username is injected into the UPDATE query.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
