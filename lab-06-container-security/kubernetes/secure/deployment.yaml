# SECURE Kubernetes Deployment — Reference Implementation
# Compare with kubernetes/vulnerable/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecure-web
  namespace: devsecure-prod  # SECURE: Dedicated namespace
  labels:
    app: devsecure-web
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecure-web
  template:
    metadata:
      labels:
        app: devsecure-web
      annotations:
        # SECURE: Opt out of automounting service account token
        "cluster-autoscaler.kubernetes.io/safe-to-evict": "true"
    spec:
      # SECURE: Dedicated service account with minimal permissions
      serviceAccountName: devsecure-sa
      automountServiceAccountToken: false  # SECURE: No SA token unless needed

      # SECURE: Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: web
          image: devsecure-web:1.0.0  # SECURE: Pinned version tag
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # SECURE: Reference secrets from K8s Secrets object
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devsecure-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: devsecure-secrets
                  key: jwt-secret
          securityContext:
            # SECURE: Non-root
            runAsNonRoot: true
            runAsUser: 1001
            # SECURE: No privilege escalation
            allowPrivilegeEscalation: false
            # SECURE: Read-only filesystem
            readOnlyRootFilesystem: true
            capabilities:
              # SECURE: Drop all capabilities
              drop: ["ALL"]
            privileged: false  # SECURE: Not privileged
          # SECURE: Resource limits defined
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # SECURE: Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            # SECURE: Only writable temp directory (not host socket!)
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
      # SECURE: No docker socket mount
---
# SECURE: ClusterIP service (not LoadBalancer) — use Ingress instead
apiVersion: v1
kind: Service
metadata:
  name: devsecure-web
  namespace: devsecure-prod
spec:
  type: ClusterIP
  selector:
    app: devsecure-web
  ports:
    - port: 80
      targetPort: 8080
